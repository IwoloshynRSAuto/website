# Data Directory (set via docker-compose volume)
data_directory = '/var/lib/postgresql/data'

# WAL Settings - Optimized for separate WAL disk
wal_level = replica
max_wal_size = 4GB
min_wal_size = 1GB
wal_compression = on
wal_log_hints = on

# Performance tuning for separate WAL disk
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9

listen_addresses = '*'
