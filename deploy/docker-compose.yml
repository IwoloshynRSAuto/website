services:
  postgres:
    image: postgres:15-alpine
    container_name: afp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-afp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_THIS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-automation_firm_db}
    ports:
      - "5432:5432"
    volumes:
      # PostgreSQL data directory on separate disk
      - /mnt/pgdata/postgres:/var/lib/postgresql/data
      # PostgreSQL WAL directory on separate disk
      - /mnt/pgwal/postgres:/var/lib/postgresql/wal
      # Custom postgresql.conf for WAL configuration
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c data_directory=/var/lib/postgresql/data

  adminer:
    image: adminer:4
    container_name: afp-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
