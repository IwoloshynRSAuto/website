version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: afp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: afp
      POSTGRES_PASSWORD: afp
      POSTGRES_DB: automation_firm_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  adminer:
    image: adminer:4
    container_name: afp-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

volumes:
  pg_data:
    driver: local




