version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: afp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-afp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_THIS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-automation_firm_db}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    # Optional: Only expose to localhost for security
    # Uncomment if you don't need external access
    # ports:
    #   - "127.0.0.1:5432:5432"

  adminer:
    image: adminer:4
    container_name: afp-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

volumes:
  pg_data:
    driver: local




